syntax = "proto3";

package auth.v1;

option go_package = "github.com/dwikynator/core-auth/gen/auth/v1;authv1";

import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// ---------------------------------------------------------------------------
// Shared Messages
// Imported by all service proto files that return tokens, profiles, or sessions.
// ---------------------------------------------------------------------------

// Returned on both successful login and token refresh.
message TokenPair {
  string access_token  = 1;
  string refresh_token = 2;
  int64  expires_in    = 3; // seconds until the access token expires
}

// Minimal user profile embedded in auth responses.
message UserProfile {
  string user_id            = 1;
  string email              = 2;
  string username           = 3;
  string phone              = 4;
  string role               = 5; // e.g. "user", "admin"
  repeated string scopes    = 6; // OAuth2 scopes for the requesting client_id
  bool email_verified       = 7;
  bool phone_verified       = 8;
  bool mfa_enabled          = 9;
}

// A single active session (device).
message Session {
  string session_id   = 1;
  string client_id    = 2;
  string ip_address   = 3;
  string user_agent   = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp last_used_at = 6;
}

// ---------------------------------------------------------------------------
// Global Swagger / OpenAPI metadata
// Applies to the merged contract/openapi.swagger.json output.
// ---------------------------------------------------------------------------
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title:       "core-auth API";
    version:     "1.0.0";
    description: "Authentication and identity service. Provides registration, login, MFA, session management, OAuth2, and admin controls.";
    contact: {
      name:  "core-auth";
      url:   "https://github.com/dwikynator/core-auth";
    };
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";

  // JWT Bearer token security definition.
  // Endpoints that require authentication inherit this via security_definitions.
  security_definitions: {
    security: {
      key:   "BearerAuth";
      value: {
        type:        TYPE_API_KEY;
        in:          IN_HEADER;
        name:        "Authorization";
        description: "JWT Bearer token. Format: `Bearer <access_token>`";
      };
    };
  };
};
