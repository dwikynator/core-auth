root = "."
tmp_dir = "tmp"

[build]
# Commands to run before building
pre_cmd = []

# The actual build command
cmd = "go build -o ./tmp/main ./cmd/server"

# The binary to execute
bin = "./tmp/main"

# Watch for changes in these directories/files
include_ext = ["go", "tpl", "tmpl", "html", "env", "proto"]
exclude_dir = ["assets", "tmp", "vendor", "gen", "minato"]

# Delay before building (ms)
delay = 1000

# Stop the old process upon build error
stop_on_error = true

# Send interrupt signal instead of kill
kill_delay = "500ms"
send_interrupt = true

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
