services:
  postgres:
    image: postgres:16-alpine
    container_name: core-auth-postgres
    environment:
      POSTGRES_USER: core_auth
      POSTGRES_PASSWORD: core_auth
      POSTGRES_DB: core_auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: core-auth-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
